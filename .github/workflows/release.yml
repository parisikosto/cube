name: Build and Release Cube

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - name: Build Cube (Linux AMD64)
        run: |
          go mod tidy
          TAG_NAME="${GITHUB_REF_NAME}"
          BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          env GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X github.com/parisikosto/cube/build.Version=${TAG_NAME} \
                      -X github.com/parisikosto/cube/build.User=${GITHUB_ACTOR} \
                      -X github.com/parisikosto/cube/build.Time=${BUILD_TIME} \
                      -X github.com/parisikosto/cube/build.GitCommit=${GITHUB_SHA} \
                      -X 'github.com/parisikosto/cube/build.TargetOS=Ubuntu 24.04.4 LTS (linux/amd64)'" \
            -o cube-linux-amd64 main.go

      - name: Create GitHub Release & Upload Asset
        uses: softprops/action-gh-release@v3
        with:
          files: cube-linux-amd64
          tag_name: ${{ github.ref_name }}
          name: "cube ${{ github.ref_name }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
